<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charlotte Albert</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <h1>Charlotte Albert</h1>
    <p class="tagline">Projects &amp; work — click a photo to read more.</p>
  </header>

  <main>
    <!--
      HOW TO ADD A NEW PROJECT:
      1. Copy an existing file in the projects/ folder and rename it.
      2. Edit the title, image, and text inside that file.
      3. Add a new <a> block below (copy one of the cards).
    -->
    <section class="photo-grid" aria-label="Projects">

      <a class="project-card" href="projects/example-1.html">
        <img src="images/project1.svg" alt="Example project one">
        <span class="project-card-title">Example Project One</span>
      </a>

      <a class="project-card" href="projects/example-2.html">
        <img src="images/project2.svg" alt="Example project two">
        <span class="project-card-title">Example Project Two</span>
      </a>

      <a class="project-card" href="projects/example-3.html">
        <img src="images/project3.svg" alt="Example project three">
        <span class="project-card-title">Example Project Three</span>
      </a>

    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Charlotte Albert</p>
  </footer>
</body>
</html>
